<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Pixelbin — nested diamond / gem silhouettes in pink gradient -->
  <defs>
    <linearGradient id="pixelbinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Outer diamond ring -->
  <path
    fill-rule="evenodd"
    clip-rule="evenodd"
    d="
      M 50 8
      L 92 38
      L 50 92
      L 8 38 Z
      M 50 22
      L 22 42
      L 50 76
      L 78 42 Z
    "
    fill="url(#pixelbinGrad)"
  />
  <!-- Middle diamond ring -->
  <path
    fill-rule="evenodd"
    clip-rule="evenodd"
    d="
      M 50 32
      L 74 48
      L 50 78
      L 26 48 Z
      M 50 42
      L 38 50
      L 50 66
      L 62 50 Z
    "
    fill="url(#pixelbinGrad)"
  />
  <!-- Inner solid diamond -->
  <path
    d="M 50 50 L 58 55 L 50 65 L 42 55 Z"
    fill="url(#pixelbinGrad)"
  />
</svg>
